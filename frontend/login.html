<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CIntetize — Entrar</title>
  <link rel="stylesheet" href="login.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,300;12..96,400;12..96,500;12..96,600;12..96,700;12..96,800&family=Instrument+Sans:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet"/>
</head>
<body>

  <!-- Background grid + glow -->
  <div class="bg-grid" aria-hidden="true"></div>
  <div class="bg-glow" aria-hidden="true"></div>

  <div class="auth-wrapper">

    <!-- Branding -->
    <div class="brand">
      <div class="logo-mark">C</div>
      <span class="logo-text">CIntetize</span>
    </div>

    <!-- Card -->
    <div class="auth-card">

      <!-- Tab switcher -->
      <div class="auth-tabs" role="tablist">
        <button class="auth-tab active" id="tabLogin"  role="tab" aria-selected="true"  aria-controls="panelLogin">Entrar</button>
        <button class="auth-tab"        id="tabSignup" role="tab" aria-selected="false" aria-controls="panelSignup">Criar conta</button>
        <div class="tab-slider" id="tabSlider"></div>
      </div>

      <!-- ── LOGIN PANEL ── -->
      <div class="auth-panel active" id="panelLogin" role="tabpanel">
        <div class="auth-headline">
          <h1>Bem-vindo de volta</h1>
          <p>Continue seus estudos de onde parou</p>
        </div>

        <div class="field-group" id="loginError" aria-live="polite"></div>

        <div class="field">
          <label for="loginEmail">E-mail</label>
          <div class="input-wrap">
            <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="m2 7 10 7 10-7"/></svg>
            <input type="email" id="loginEmail" placeholder="seu@email.com" autocomplete="email" required/>
          </div>
        </div>

        <div class="field">
          <div class="label-row">
            <label for="loginPassword">Senha</label>
            <a href="#" class="forgot-link" id="forgotLink">Esqueceu a senha?</a>
          </div>
          <div class="input-wrap">
            <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
            <input type="password" id="loginPassword" placeholder="••••••••" autocomplete="current-password" required/>
            <button type="button" class="eye-btn" data-target="loginPassword" aria-label="Mostrar senha">
              <svg class="eye-open" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
              <svg class="eye-closed" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" style="display:none"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
            </button>
          </div>
        </div>

        <button class="btn-submit" id="loginBtn">
          <span class="btn-label">Entrar</span>
          <span class="btn-spinner" hidden>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" class="spin-icon"><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg>
          </span>
        </button>

        <div class="divider"><span>ou continue com</span></div>

        <div class="social-row">
          <button class="social-btn" id="googleBtn" type="button">
            <svg viewBox="0 0 24 24" width="18" height="18"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
            Google
          </button>
          <button class="social-btn" id="githubBtn" type="button">
            <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor"><path d="M12 2C6.477 2 2 6.484 2 12.017c0 4.425 2.865 8.18 6.839 9.504.5.092.682-.217.682-.483 0-.237-.008-.868-.013-1.703-2.782.605-3.369-1.343-3.369-1.343-.454-1.158-1.11-1.466-1.11-1.466-.908-.62.069-.608.069-.608 1.003.07 1.531 1.032 1.531 1.032.892 1.53 2.341 1.088 2.91.832.092-.647.35-1.088.636-1.338-2.22-.253-4.555-1.113-4.555-4.951 0-1.093.39-1.988 1.029-2.688-.103-.253-.446-1.272.098-2.65 0 0 .84-.27 2.75 1.026A9.564 9.564 0 0 1 12 6.844a9.59 9.59 0 0 1 2.504.337c1.909-1.296 2.747-1.027 2.747-1.027.546 1.379.202 2.398.1 2.651.64.7 1.028 1.595 1.028 2.688 0 3.848-2.339 4.695-4.566 4.943.359.309.678.92.678 1.855 0 1.338-.012 2.419-.012 2.747 0 .268.18.58.688.482A10.019 10.019 0 0 0 22 12.017C22 6.484 17.522 2 12 2z"/></svg>
            GitHub
          </button>
        </div>
      </div>

      <!-- ── SIGNUP PANEL ── -->
      <div class="auth-panel" id="panelSignup" role="tabpanel">
        <div class="auth-headline">
          <h1>Criar sua conta</h1>
          <p>Comece a estudar com IA gratuitamente</p>
        </div>

        <div class="field-group" id="signupError" aria-live="polite"></div>

        <div class="field">
          <label for="signupName">Nome completo</label>
          <div class="input-wrap">
            <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
            <input type="text" id="signupName" placeholder="Seu nome" autocomplete="name" required/>
          </div>
        </div>

        <div class="field">
          <label for="signupEmail">E-mail</label>
          <div class="input-wrap">
            <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="m2 7 10 7 10-7"/></svg>
            <input type="email" id="signupEmail" placeholder="seu@email.com" autocomplete="email" required/>
          </div>
        </div>

        <div class="field">
          <label for="signupPassword">Senha</label>
          <div class="input-wrap">
            <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
            <input type="password" id="signupPassword" placeholder="Mínimo 8 caracteres" autocomplete="new-password" required/>
            <button type="button" class="eye-btn" data-target="signupPassword" aria-label="Mostrar senha">
              <svg class="eye-open" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
              <svg class="eye-closed" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" style="display:none"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
            </button>
          </div>
          <!-- Password strength bar -->
          <div class="strength-wrap" id="strengthWrap" hidden>
            <div class="strength-bar">
              <div class="strength-fill" id="strengthFill"></div>
            </div>
            <span class="strength-label" id="strengthLabel"></span>
          </div>
        </div>

        <div class="field">
          <label for="signupConfirm">Confirmar senha</label>
          <div class="input-wrap">
            <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M9 12l2 2 4-4"/><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
            <input type="password" id="signupConfirm" placeholder="Repita a senha" autocomplete="new-password" required/>
          </div>
        </div>

        <label class="checkbox-label">
          <input type="checkbox" id="acceptTerms"/>
          <span class="checkbox-custom"></span>
          <span>Li e aceito os <a href="#" class="inline-link">Termos de Uso</a> e a <a href="#" class="inline-link">Política de Privacidade</a></span>
        </label>

        <button class="btn-submit" id="signupBtn">
          <span class="btn-label">Criar conta</span>
          <span class="btn-spinner" hidden>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" class="spin-icon"><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg>
          </span>
        </button>
      </div>

    </div>

    <!-- Footer note -->
    <p class="auth-footer">Plataforma de estudos com IA para vestibulares e concursos</p>

  </div>

  <!-- Forgot password modal -->
  <div class="modal-overlay" id="forgotModal" hidden>
    <div class="modal-card" role="dialog" aria-modal="true" aria-labelledby="forgotTitle">
      <button class="modal-close" id="forgotClose" aria-label="Fechar">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
      <h2 class="modal-title" id="forgotTitle">Redefinir senha</h2>
      <p class="modal-sub">Insira seu e-mail e enviaremos um link de redefinição.</p>
      <div class="field">
        <label for="forgotEmail">E-mail</label>
        <div class="input-wrap">
          <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="m2 7 10 7 10-7"/></svg>
          <input type="email" id="forgotEmail" placeholder="seu@email.com"/>
        </div>
      </div>
      <button class="btn-submit" id="forgotBtn">
        <span class="btn-label">Enviar link</span>
        <span class="btn-spinner" hidden>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" class="spin-icon"><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg>
        </span>
      </button>
      <div class="field-group" id="forgotMsg" aria-live="polite"></div>
    </div>
  </div>

  <!-- Toast -->
  <div id="toast"></div>

  <script src="login.js"></script>
</body>
</html>
